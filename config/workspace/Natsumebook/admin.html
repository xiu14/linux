<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>友人帐图鉴管理</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #141414;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-strong: rgba(255, 255, 255, 0.1);
      --line: rgba(200, 160, 60, 0.28);
      --text: rgba(255, 255, 255, 0.88);
      --muted: rgba(255, 255, 255, 0.52);
      --accent: rgba(200, 160, 60, 0.86);
      --danger: #e47c6d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 14%, rgba(255, 255, 255, 0.08), transparent 26%),
        linear-gradient(180deg, #191919 0%, var(--bg) 100%);
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(200, 160, 60, 0.12);
      color: var(--text);
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      border-color: rgba(200, 160, 60, 0.62);
      outline: none;
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 6px;
      padding: 0 12px;
      background: rgba(0, 0, 0, 0.22);
      color: var(--text);
    }

    input:focus {
      border-color: rgba(200, 160, 60, 0.72);
      outline: none;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100svh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(20, 20, 20, 0.78);
      backdrop-filter: blur(12px);
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(230px, 300px) minmax(0, 1fr);
      gap: 18px;
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    .sidebar,
    .editor,
    .login-panel {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
    }

    .sidebar {
      overflow: hidden;
    }

    .season-title {
      padding: 14px 14px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .episode-list {
      display: grid;
      gap: 4px;
      padding: 0 10px 14px;
    }

    .episode-button {
      display: grid;
      grid-template-columns: 42px 1fr;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 46px;
      padding: 6px;
      border-color: transparent;
      background: transparent;
      text-align: left;
    }

    .episode-button.is-active {
      border-color: var(--line);
      background: rgba(200, 160, 60, 0.12);
    }

    .episode-button img {
      width: 42px;
      height: 32px;
      border-radius: 4px;
      object-fit: cover;
      background: rgba(255, 255, 255, 0.06);
    }

    .episode-button span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .editor {
      padding: 18px;
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .editor-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(240px, 320px);
      gap: 18px;
      align-items: start;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .preview {
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.22);
    }

    .preview img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: contain;
    }

    .preview p {
      margin: 0;
      padding: 10px 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--muted);
      font-size: 12px;
      word-break: break-all;
    }

    .status {
      min-height: 22px;
      color: var(--accent);
      font-size: 13px;
    }

    .status.is-error {
      color: var(--danger);
    }

    .login-shell {
      display: grid;
      place-items: center;
      min-height: 100svh;
      padding: 22px;
    }

    .login-panel {
      width: min(420px, 100%);
      padding: 22px;
    }

    .login-panel h1 {
      margin: 0 0 18px;
      font-size: 20px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 820px) {
      .layout,
      .form-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>
  <section class="login-shell" id="loginView">
    <form class="login-panel" id="loginForm">
      <h1>管理员登录</h1>
      <div class="field">
        <label for="passwordInput">密码</label>
        <input id="passwordInput" name="password" type="password" autocomplete="current-password" required>
      </div>
      <div class="actions">
        <button type="submit">登录</button>
      </div>
      <p class="status" id="loginStatus"></p>
    </form>
  </section>

  <section class="app hidden" id="adminView">
    <header class="topbar">
      <div class="brand">
        <h1>友人帐图鉴管理</h1>
        <p>按单集编辑标题、名字和图片</p>
      </div>
      <button type="button" id="logoutButton">退出</button>
    </header>

    <main class="layout">
      <aside class="sidebar" id="episodeNav"></aside>

      <section class="editor">
        <div class="editor-header">
          <h2 id="editorTitle">选择一集</h2>
          <a href="/" target="_blank" rel="noreferrer">查看前台</a>
        </div>

        <form id="editForm">
          <div class="form-grid">
            <div>
              <div class="field">
                <label for="titleInput">显示文字</label>
                <input id="titleInput" name="title" type="text" required>
              </div>

              <div class="field">
                <label for="nameInput">妖怪名字</label>
                <input id="nameInput" name="name" type="text" placeholder="例如：菱垣">
              </div>

              <div class="field">
                <label for="imageInput">这一集的图片</label>
                <input id="imageInput" name="image" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
              </div>

              <div class="actions">
                <button type="submit">保存文字和名字</button>
                <button type="button" id="uploadButton">上传图片</button>
              </div>
              <p class="status" id="editStatus"></p>
            </div>

            <div class="preview">
              <img id="imagePreview" src="assets/images/monsters/thumbs/placeholder.webp" alt="">
              <p id="imagePath">assets/images/monsters/thumbs/placeholder.webp</p>
            </div>
          </div>
        </form>
      </section>
    </main>
  </section>

  <script>
    const loginView = document.querySelector("#loginView");
    const adminView = document.querySelector("#adminView");
    const loginForm = document.querySelector("#loginForm");
    const loginStatus = document.querySelector("#loginStatus");
    const logoutButton = document.querySelector("#logoutButton");
    const episodeNav = document.querySelector("#episodeNav");
    const editorTitle = document.querySelector("#editorTitle");
    const editForm = document.querySelector("#editForm");
    const titleInput = document.querySelector("#titleInput");
    const nameInput = document.querySelector("#nameInput");
    const imageInput = document.querySelector("#imageInput");
    const imagePreview = document.querySelector("#imagePreview");
    const imagePath = document.querySelector("#imagePath");
    const editStatus = document.querySelector("#editStatus");
    const uploadButton = document.querySelector("#uploadButton");

    let catalog = [];
    let selected = null;

    init();

    async function init() {
      if (await hasSession()) {
        showAdmin();
        await loadCatalog();
        selectFirstEpisode();
      } else {
        showLogin();
      }
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus(loginStatus, "");

      const response = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: loginForm.password.value })
      });

      if (!response.ok) {
        setStatus(loginStatus, "密码不正确", true);
        return;
      }

      showAdmin();
      await loadCatalog();
      selectFirstEpisode();
    });

    logoutButton.addEventListener("click", async () => {
      await fetch("/api/admin/logout", { method: "POST" });
      showLogin();
    });

    editForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!selected) {
        return;
      }

      const response = await fetch(endpoint(selected), {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title: titleInput.value,
          name: nameInput.value
        })
      });

      const result = await response.json();

      if (!response.ok) {
        setStatus(editStatus, result.error || "保存失败", true);
        return;
      }

      selected.episode.title = result.episode.title;
      selected.episode.name = result.episode.name;
      renderNav();
      selectEpisode(selected.season.season, selected.episode.episode);
      setStatus(editStatus, "文字和名字已保存");
    });

    uploadButton.addEventListener("click", async () => {
      if (!selected || !imageInput.files[0]) {
        setStatus(editStatus, "请选择这一集的图片", true);
        return;
      }

      const formData = new FormData();
      formData.append("image", imageInput.files[0]);

      const response = await fetch(`${endpoint(selected)}/image`, {
        method: "POST",
        body: formData
      });

      const result = await response.json();

      if (!response.ok) {
        setStatus(editStatus, result.error || "上传失败", true);
        return;
      }

      selected.episode.image = result.episode.image;
      selected.episode.thumbnail = result.episode.thumbnail;
      imageInput.value = "";
      renderNav();
      selectEpisode(selected.season.season, selected.episode.episode);
      setStatus(editStatus, `图片已上传，缩略图约 ${formatBytes(result.sizes.thumbnail)}，主图约 ${formatBytes(result.sizes.image)}`);
    });

    async function hasSession() {
      const response = await fetch("/api/admin/session");
      return response.ok;
    }

    async function loadCatalog() {
      const response = await fetch("/api/catalog", { cache: "no-store" });
      catalog = await response.json();
      renderNav();
    }

    function renderNav() {
      episodeNav.replaceChildren();

      catalog.forEach((season) => {
        const title = document.createElement("div");
        title.className = "season-title";
        title.textContent = `第 ${season.season} 季`;
        episodeNav.append(title);

        const list = document.createElement("div");
        list.className = "episode-list";

        season.episodes.forEach((episode) => {
          const button = document.createElement("button");
          button.className = "episode-button";
          button.type = "button";
          button.dataset.season = season.season;
          button.dataset.episode = episode.episode;
          button.innerHTML = `<img src="${episode.thumbnail}" alt=""><span>${episode.title}</span>`;
          button.addEventListener("click", () => selectEpisode(season.season, episode.episode));
          list.append(button);
        });

        episodeNav.append(list);
      });
    }

    function selectFirstEpisode() {
      const season = catalog[0];
      const episode = season?.episodes?.[0];

      if (season && episode) {
        selectEpisode(season.season, episode.episode);
      }
    }

    function selectEpisode(seasonNumber, episodeNumber) {
      const season = catalog.find((item) => Number(item.season) === Number(seasonNumber));
      const episode = season?.episodes?.find((item) => Number(item.episode) === Number(episodeNumber));

      if (!season || !episode) {
        return;
      }

      selected = { season, episode };
      editorTitle.textContent = `第 ${season.season} 季 第 ${episode.episode} 集`;
      titleInput.value = episode.title;
      nameInput.value = episode.name || "";
      imagePreview.src = episode.thumbnail;
      imagePath.textContent = episode.image;
      setStatus(editStatus, "");

      document.querySelectorAll(".episode-button").forEach((button) => {
        button.classList.toggle(
          "is-active",
          Number(button.dataset.season) === Number(seasonNumber) &&
            Number(button.dataset.episode) === Number(episodeNumber)
        );
      });
    }

    function endpoint(selection) {
      return `/api/catalog/season/${selection.season.season}/episode/${selection.episode.episode}`;
    }

    function showAdmin() {
      loginView.classList.add("hidden");
      adminView.classList.remove("hidden");
    }

    function showLogin() {
      adminView.classList.add("hidden");
      loginView.classList.remove("hidden");
      loginForm.reset();
      setStatus(loginStatus, "");
    }

    function setStatus(element, message, isError = false) {
      element.textContent = message;
      element.classList.toggle("is-error", isError);
    }

    function formatBytes(value) {
      if (!Number.isFinite(value)) {
        return "-";
      }

      if (value < 1024 * 1024) {
        return `${Math.max(1, Math.round(value / 1024))}KB`;
      }

      return `${(value / 1024 / 1024).toFixed(1)}MB`;
    }
  </script>
</body>
</html>
