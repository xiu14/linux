<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>秀仔视频库</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Cloudflare R2 + AList</p>
          <h1 id="appTitle">秀仔视频库</h1>
        </div>
        <button id="refreshButton" class="ghost-button" type="button">刷新列表</button>
      </header>

      <main class="layout">
        <section class="player-panel">
          <div class="player-card">
            <div id="videoWrap" class="video-wrap">
              <video id="videoPlayer" preload="metadata" playsinline webkit-playsinline controls></video>
              <div id="overlayControls" class="overlay-controls hidden" aria-label="播放器快捷操作">
                <button id="overlayBackwardButton" type="button">后退 10 秒</button>
                <button id="overlayForwardButton" type="button">快进 10 秒</button>
                <button id="overlayNextButton" type="button">下一个</button>
                <button id="fullscreenButton" type="button">全屏</button>
              </div>
              <div id="emptyState" class="empty-state">
                <p>请选择一个视频开始播放</p>
              </div>
            </div>

            <div class="player-meta">
              <div>
                <p class="meta-label">当前播放</p>
                <h2 id="videoTitle">未选择视频</h2>
                <p id="videoDetail" class="video-detail">支持手机播放、滑动进度和全屏。</p>
              </div>
              <div class="quick-actions">
                <button id="playPauseButton" type="button">暂停</button>
              </div>
            </div>
          </div>
        </section>

        <aside class="library-panel">
          <div class="library-head">
            <div>
              <p class="meta-label">视频列表</p>
              <h2 id="folderTitle">全部视频</h2>
            </div>
            <button id="upButton" class="ghost-button" type="button">返回上级</button>
          </div>

          <div id="rootTabs" class="root-tabs"></div>
          <nav id="breadcrumbs" class="breadcrumbs" aria-label="路径导航"></nav>
          <p id="statusText" class="status-text">正在加载列表...</p>
          <div id="libraryList" class="library-list"></div>
        </aside>
      </main>
    </div>

    <template id="itemTemplate">
      <button class="library-item" type="button">
        <div class="thumb-wrap">
          <img class="thumb-image" alt="" loading="lazy">
          <div class="thumb-fallback"></div>
        </div>
        <div class="item-body">
          <div class="item-row">
            <span class="item-name"></span>
            <span class="item-tag"></span>
          </div>
          <p class="item-subtitle"></p>
        </div>
      </button>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
